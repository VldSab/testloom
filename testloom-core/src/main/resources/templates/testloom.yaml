testloom:
  recorder:
    enabled: false
    mode: local
    output-dir: ./.testloom/captures
    include-bodies: true
    max-body-size-bytes: 65536
    include-paths:
      - /api/**
    exclude-paths:
      - /actuator/**
  redaction:
    mask: "***"
    header-default-action: MASK
    query-param-default-action: MASK
    json-field-default-action: MASK
    rules:
      - type: HEADER
        target: authorization
        matcher: EXACT
        action: MASK
      - type: JSON_FIELD
        target: password
        matcher: EXACT
        action: MASK
